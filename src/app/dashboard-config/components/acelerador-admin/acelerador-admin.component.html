<div class="container-fluid p-4">
    <div class="row py-3">
        <div class="col-12">
            <h3>Acelerador de Ventas — Modulos y Lecciones</h3>
            <p class="text-muted">
                El precio mensual de la suscripcion se edita en Configuraciones. Los videos se suben
                a un bucket privado: nunca quedan con un link publico.
            </p>
        </div>
    </div>

    <div class="row py-3">
        <div class="col-8">
            <input type="text" [(ngModel)]="nuevoModuloTitulo" placeholder="Nombre del modulo nuevo" class="form-control">
        </div>
        <div class="col-4">
            <button class="btn btn-success" (click)="crearModulo()">+ Crear modulo</button>
        </div>
    </div>

    <div *ngIf="loader">Cargando...</div>

    <div class="card mb-4" *ngFor="let modulo of listModules">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-8">
                    <input type="text" [(ngModel)]="modulo.title" class="form-control form-control-sm">
                </div>
                <div class="col-4 text-right">
                    <button class="btn btn-sm btn-primary" (click)="actualizarModulo(modulo)">Guardar</button>
                    <button class="btn btn-sm btn-danger" (click)="eliminarModulo(modulo)">Eliminar modulo</button>
                </div>
            </div>

            <ul class="list-group mt-3">
                <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let leccion of modulo.lessons">
                    <span>{{ leccion.title }}</span>
                    <span>
                        <a class="btn btn-sm btn-outline-secondary" [routerLink]="['/acelerador/leccion', leccion.id]" target="_blank">Vista previa</a>
                        <button class="btn btn-sm btn-outline-primary" (click)="editarLeccion(leccion)">Editar</button>
                        <button class="btn btn-sm btn-outline-danger" (click)="eliminarLeccion(leccion)">Eliminar</button>
                    </span>
                </li>
            </ul>

            <button class="btn btn-sm btn-secondary mt-2" (click)="crearLeccion(modulo)">+ Agregar leccion</button>
        </div>
    </div>
</div>
