<h2 mat-dialog-title class="form-group bg-primary text-white rounded">Generar Guía</h2>
<mat-dialog-content class="mat-typography">
    <div class="form row" *ngIf="!btndisabled">
        <div class="form-group col-6">
            <label>Transportadora</label>
            <input type="text" [value]="transportadoraNombre" class="form-control form-control-sm" disabled>
        </div>
        <div class="form-group col-6">
            <label>Tipo de envío</label>
            <input type="text" [value]="data.ven_tipo === 'contraEntrega' ? 'Contra entrega' : (data.ven_tipo || '-')" class="form-control form-control-sm" disabled>
        </div>
        <div class="form-group col-6">
            <label>Valor mercancía</label>
            <input currencyMask [ngModel]="data.ven_total" class="form-control form-control-sm" [options]="opcionCurrencys" disabled/>
        </div>
        <div class="form-group col-6">
            <label>Valor del flete</label>
            <input currencyMask [ngModel]="data.fleteValor || data.flteTotal" class="form-control form-control-sm" [options]="opcionCurrencys" disabled/>
        </div>
        <div class="form-group col-12">
            <p class="text-muted" style="font-size: 12px; margin: 0;">
                El peso, las dimensiones y el valor declarado los calcula Mipaquete automáticamente a partir del producto. Al confirmar se genera la guía real de envío.
            </p>
        </div>
    </div>
    <div class="row" *ngIf="btndisabled">
        <div class="col-12">
            <div class="d-flex justify-content-center">
                <mat-spinner></mat-spinner>
            </div>
        </div>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close [disabled]="btndisabled">Cerrar</button>
    <button mat-button cdkFocusInitial (click)="submit()" [disabled]="btndisabled">
        Generar Guia
    </button>
</mat-dialog-actions>
