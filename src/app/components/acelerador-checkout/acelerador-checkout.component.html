<div *ngIf="!mostrarFormAnon">
    <button type="button" [class]="buttonClass" (click)="onClickPrincipal()" [disabled]="procesandoPago">
        {{ procesandoPago ? 'Procesando...' : buttonLabel }}
    </button>
</div>

<div *ngIf="mostrarFormAnon" class="checkout-anon">
    <h5 class="checkout-anon__title">Completa tus datos para continuar</h5>
    <input type="text" required [ngModel]="anonData.usu_nombre" (ngModelChange)="anonData.usu_nombre = soloLetras($event)" placeholder="Nombre completo *" class="form-control mb-2">
    <input type="email" required [(ngModel)]="anonData.usu_email" placeholder="Correo electronico (ej: nombre@correo.com) *" class="form-control mb-2">
    <input type="tel" required [ngModel]="anonData.usu_telefono" (ngModelChange)="anonData.usu_telefono = soloNumeros($event)" placeholder="Telefono / WhatsApp *" class="form-control mb-2">
    <input type="text" required [ngModel]="anonData.usu_documento" (ngModelChange)="anonData.usu_documento = soloNumeros($event)" placeholder="Numero de documento *" class="form-control mb-2">
    <input type="text" required [ngModel]="anonData.usu_ciudad" (ngModelChange)="anonData.usu_ciudad = soloLetras($event)" placeholder="Ciudad *" class="form-control mb-3">
    <button type="button" class="btn btn-success btn-lg w-100" (click)="pagarAnonimo()"
        [disabled]="procesandoCuenta || procesandoPago || !formularioValido()">
        {{ (procesandoCuenta || procesandoPago) ? 'Procesando...' : 'Continuar al pago' }}
    </button>
</div>
